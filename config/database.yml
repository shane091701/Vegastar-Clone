default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("PGHOST", "127.0.0.1") %>
  username: <%= ENV.fetch("PGUSER", "postgres") %>
  password: <%= ENV.fetch("PGPASSWORD", "postgres") %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  # Avoid Windows libpq negotiation drops ("server closed the connection unexpectedly")
  gssencmode: disable
  sslmode: disable

development:
  <<: *default
  database: vegastar_erp_development

test:
  <<: *default
  database: vegastar_erp_test

production:
  # Railway provides the full connection string as DATABASE_URL (its internal
  # network is plaintext, so sslmode disable is correct there). gssencmode is
  # disabled to skip GSSAPI negotiation -- harmless on Linux and required by
  # the Windows libpq build. If you ever point this at an SSL-required
  # database, set PGSSLMODE=require in the environment.
  adapter: postgresql
  encoding: unicode
  url: <%= ENV["DATABASE_URL"] %>
  gssencmode: disable
  sslmode: <%= ENV.fetch("PGSSLMODE", "disable") %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
